# ⚠️  CLOUDFLARE WARNING — READ THIS BEFORE DEPLOYING TO RENDER  ⚠️
#
# The TeleBotHost API is behind Cloudflare bot detection, which blocks
# requests from datacenter IPs. Render (like Vercel, Railway, Fly, AWS)
# uses datacenter IPs, so deployed MCP instances will receive HTTP 403
# Cloudflare challenge responses and WILL NOT WORK.
#
# RECOMMENDED: Run locally via stdio instead (see README.md).
#   - Uses your residential IP → Cloudflare allows it
#   - Standard MCP pattern (Claude Desktop, Cursor, VS Code)
#
# ALTERNATIVE: Self-host server.ts on a residential connection (home server,
# VPS with residential proxy, etc.). Only then does this render.yaml apply.
#
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: telebothost-mcp
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci
    startCommand: npm run serve:http
    healthCheckPath: /api/health
    healthCheckGracePeriodSeconds: 30
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: TELEBOTHOST_API_KEY
        sync: false  # set manually in dashboard (required for HTTP mode)
      - key: MCP_AUTH_TOKEN
        sync: false  # optional — protects your MCP endpoint
